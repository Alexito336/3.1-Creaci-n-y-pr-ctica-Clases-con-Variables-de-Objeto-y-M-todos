<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Inventario Aleatorio</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; background: #2c3e50; margin: 0; }
        .card { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); text-align: center; width: 350px; }
        h1 { color: #2c3e50; font-size: 1.5rem; }
        button { background: #e67e22; color: white; border: none; padding: 12px 20px; border-radius: 8px; cursor: pointer; font-weight: bold; width: 100%; transition: 0.3s; }
        button:hover { background: #d35400; transform: scale(1.02); }
        #display { margin-top: 20px; padding: 15px; background: #ecf0f1; border-radius: 8px; border-left: 5px solid #e67e22; min-height: 50px; color: #34495e; font-size: 0.9rem; display: flex; align-items: center; justify-content: center; }
    </style>
</head>
<body>
    <div class="card">
        <h1>📦 Mis Productos</h1>
        <button id="btnMostrar">🎲 Mostrar Producto Aleatorio</button>
        <div id="display">Haz clic para ver un producto</div>
    </div>
    <script src="clases.js"></script>
</body>
</html>
