<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard de Productos</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .card {
            background: white;
            padding: 2rem;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            text-align: center;
            max-width: 400px;
            width: 90%;
        }
        h1 { color: #333; font-size: 1.5rem; margin-bottom: 1.5rem; }
        button {
            background: #764ba2;
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 50px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, background 0.3s;
        }
        button:hover {
            background: #5a3782;
            transform: translateY(-2px);
        }
        button:active { transform: translateY(0); }
        #resultado-container {
            margin-top: 20px;
            padding: 15px;
            border-radius: 12px;
            background: #f8f9fa;
            border-left: 5px solid #764ba2;
            display: none; /* Se oculta hasta que se haga clic */
            animation: fadeIn 0.5s ease;
        }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .detalle-texto { color: #555; line-height: 1.6; margin: 0; }
    </style>
</head>
<body>
    <div class="card">
        <h1>Gestión de Inventario</h1>
        <button id="btnMostrar">🚀 Mostrar Producto</button>
        <div id="resultado-container">
            <p id="texto-detalle" class="detalle-texto"></p>
        </div>
    </div>
    <script src="clases.js"></script>
</body>
</html>
